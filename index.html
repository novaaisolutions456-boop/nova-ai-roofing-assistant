<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova AI Roofing Assistant</title>

<style>

*{
    box-sizing:border-box;
}

.hero{
    width:100%;
    text-align:center;
    padding:20px 0 30px;
    margin:0;
    box-sizing:border-box;
}

.logo{
    width:80px;
    height:80px;
    border-radius:50%;
    background:white;
    padding:10px;
    box-shadow:0 8px 20px
rgba(0,0,0,.15);
    margin-bottom:15px;
}

.tagline{
    font-size:17px;
    color:#4B5563;
    font-weight:500;
    margin-top:8px;
    margin-bottom:30px;
}

body{
    margin:0;
    padding:20px;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
    background:#eef3f8;
    background-image:linear-gradient(rgba(0,0,0,.15),rgba(0,0,0,.15)),url("gettyimages-1455269682-170667a.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}
.company-logo{
    width:90px;
    height:90px;
    margin:0 auto 20px;
    border-radius:50%;
    background:linear-gradient(135deg,#0b5ed7,#00a86b);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:42px;
    font-weight:bold;
    font-family:Arial,sans-serif;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.container{
    width:980px;
    max-width:95%;
    margin:25px auto;
    padding:30px;
    background:#d8ecff;
    border-radius:24px;
    box-shadow:0 20px 50px rgba(0,0,0,.22);
    border:1px solid rgba(255,255,255,.7);
}

h2{
text-align:center;
color:#0b5ed7;
}

input,
select,
textarea{
    width:100%;
    padding:16px;
    margin-top:8px;
    margin-bottom:16px;
    border:2px solid #d9e6f3;
    border-radius:16px;
    background:#ffffff;
    font-size:16px;
    color:#333;
    box-sizing:border-box;
    transition:.25s;
    box-shadow:0 8px 18px rgba(0,0,0,.08);
}

input:focus,
select:focus,
textarea:focus{
    border-color:#0b5ed7;
    outline:none;
    box-shadow:0 0 0 4px rgba(11,94,215,.15);
}

button{
    width:100%;
    padding:18px;
    background:#0b5ed7;
    color:white;
    border:none;
    border-radius:16px;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 10px 22px rgba(11,94,215,.35);
}

button:hover{
    transform:translateY(-2px);
    background:#0954c4;
}


#reply{
    margin-top:25px;
    padding:22px;
    background:white;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    border-left:6px solid #0b5ed7;
    font-size:16px;
    line-height:1.8;
}
@media (max-width:768px){

.container{
    padding:20px;
    margin:15px auto;
}
.form-row{
    display:flex;
    gap:10px;
}

.form-row input,
.form-row select{
    width:50%;
}


h1{
    font-size:28px;
}

input,
select,
textarea,
button{
    font-size:16px;
}

}

</style>

</head>

<body>

<div class="container">
<div class="hero">
    <h1>Nova AI Roofing</h1>
    <p class="tagline">
    Licensed • Insured • Residential & Commercial Roofing
</p>


<div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:25px;flex-wrap:wrap;">

</div>

<div class="form-row">

<input
type="text"
id="name"
placeholder="👤 Full Name">

<input
type="text"
id="phone"
placeholder="📞 Phone Number">

</div>

<div class="form-row">

<input
type="email"
id="email"
placeholder="✉️ Email Address">

<select id="service">
    <option value="">🏠 Roofing Service</option>
    <option>🔨 Roof Repair</option>
    <option>🏡 New Roof Installation</option>
    <option>🔍 Roof Inspection</option>
    <option>♻️ Roof Replacement</option>
    <option>🌧️ Gutter Installation</option>
</select>

</div>

<input
type="text"
id="address"
placeholder="📍 Property Address">


<textarea
id="message"
rows="4"
placeholder=" Describe your roofing problem"></textarea>

<button id="submitBtn"
onclick="sendMessage()">
Request Roofing Service
</button>
<div id="reply"></div>
<hr style="margin:30px 0;border:none;border-top:1px solid #dbe5ef;">

<div style="text-align:center;font-size:14px;color:#666;line-height:1.8;">

 Nova AI Roofing<br>

 24/7 Emergency Roofing Services<br>

 Licensed • Insured • Free Estimates<br><br>

© 2026 Nova AI Roofing. All Rights Reserved.

</div>
</div>

<script>

async function sendMessage(){

const btn = document.getElementById("submitBtn");

btn.disabled = true;
btn.innerHTML = "⏳ Sending Request...";

try{

const response = await fetch("https://nova-ai-solutions.app.n8n.cloud/webhook-test/09fa26a0-d755-444b-92ff-4d342c4c3c32",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:document.getElementById("name").value,

phone:document.getElementById("phone").value,

email:document.getElementById("email").value,

address:document.getElementById("address").value,

service:document.getElementById("service").value,

message:document.getElementById("message").value

})

});

const text = await response.text();

document.getElementById("reply").innerHTML = text;

btn.innerHTML = "✅ Request Sent";

}catch(error){

document.getElementById("reply").innerHTML =
"❌ Something went wrong.";

btn.innerHTML = "Request Roofing Service";

btn.disabled = false;

}

}

</script>

</body>
</html>
