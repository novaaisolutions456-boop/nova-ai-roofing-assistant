<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova AI Roofing Assistant</title>

<style>

*{
    box-sizing:border-box;
}

.hero{
    width:100%;
    text-align:center;
    padding:20px 0 30px;
    margin:0;
    box-sizing:border-box;
}

.logo{
    width:80px;
    height:80px;
    border-radius:50%;
    background:white;
    padding:10px;
    box-shadow:0 8px 20px
rgba(0,0,0,.15);
    margin-bottom:15px;
}

.tagline{
    font-size:17px;
    color:#4B5563;
    font-weight:500;
    margin-top:8px;
    margin-bottom:30px;
}

body{
    margin:0;
    padding:20px;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
    background:#eef3f8;
    background-image:linear-gradient(rgba(0,0,0,.15),rgba(0,0,0,.15)),url("gettyimages-1455269682-170667a.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}
.company-logo{
    width:90px;
    height:90px;
    margin:0 auto 20px;
    border-radius:50%;
    background:linear-gradient(135deg,#0b5ed7,#00a86b);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:42px;
    font-weight:bold;
    font-family:Arial,sans-serif;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.container{
    width:700px;
    max-width:95%;
    margin:40px auto;
    padding:35px;
    background:#d6ebff;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,.18);
    border:1px solid rgba(255,255,255,.6);
    box-sizing:border-box;
}

h2{
text-align:center;
color:#0b5ed7;
}

input,
select,
textarea{
    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:18px;
    border:1px solid #d8e3ec;
    border-radius:12px;
    background:#ffffff;
    font-size:16px;
    box-sizing:border-box;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
    transition:.3s;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#0b5ed7;
    outline:none;
    box-shadow:0 0 0 4px rgba(11,94,215,.15);
}

button{
    width:100%;
    padding:16px;
    background:linear-gradient(135deg,#0b5ed7,#198754);
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}


#reply{
    margin-top:20px;
    padding:20px;
    background:#ffffff;
    border-left:5px solid #0b5ed7;
    border-radius:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    font-size:16px;
    line-height:1.7;
    color:#333;
}
@media (max-width:768px){

.container{
    padding:20px;
    margin:15px auto;
}

h1{
    font-size:28px;
}

input,
select,
textarea,
button{
    font-size:16px;
}

}

</style>

</head>

<body>

<div class="container">
<div class="hero">
    <h1>Nova AI Roofing</h1>
    <p class="tagline">
    Licensed • Insured • Residential & Commercial Roofing
</p>

</div><div style="background:#ffffff;border-radius:12px;padding:15px;margin-bottom:25px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,.12);">

📞 <strong>24/7 Emergency Roofing</strong><br><br>

 Free Estimates &nbsp;&nbsp;|&nbsp;&nbsp;  Residential & Commercial &nbsp;&nbsp;|&nbsp;&nbsp;  Licensed & Insured

</div>
<div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:25px;flex-wrap:wrap;">

</div>

<input
type="text"
id="name"
placeholder="👤 Full Name">

<input
type="text"
id="phone"
placeholder="📞 Phone Number">
<input
type="email"
id="email"
placeholder="✉️ Email Address">

<input
type="text"
id="address"
placeholder="📍 Property Address">
<label><strong>🏠 Select Roofing Service</strong></label>

<select id="service">
    <option value="">Choose a Roofing Service...</option>
    <option>🔨 Roof Repair</option>
    <option>🏡 New Roof Installation</option>
    <option>🔍 Roof Inspection</option>
    <option>♻️ Roof Replacement</option>
    <option>🌧️ Gutter Installation</option>
    <option>🚨 Emergency Roofing Service</option>
</select>

<label><strong>📷 Upload Roof Photo</strong></label>
<input
type="file"
id="photo"
accept="image/*">
<textarea
id="message"
rows="6"
placeholder=" Describe your roofing problem"></textarea>

<button id="submitBtn"
onclick="sendMessage()">
Request Roofing Service
</button>
<div id="reply"></div>
<hr style="margin:30px 0;border:none;border-top:1px solid #dbe5ef;">

<div style="text-align:center;font-size:14px;color:#666;line-height:1.8;">

 Nova AI Roofing<br>

 24/7 Emergency Roofing Services<br>

 Licensed • Insured • Free Estimates<br><br>

© 2026 Nova AI Roofing. All Rights Reserved.

</div>
</div>

<script>

async function sendMessage(){const btn = document.getElementById("submitBtn");

btn.disabled = true;
btn.innerHTML = "⏳ Sending Request...";

const response = await fetch("https://nova-ai-solutions.app.n8n.cloud/webhook-test/09fa26a0-d755-444b-92ff-4d342c4c3c32",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({

name: document.getElementById("name").value,

phone: document.getElementById("phone").value,

email: document.getElementById("email").value,

address: document.getElementById("address").value,

service: document.getElementById("service").value,

photo: document.getElementById("photo").value,

message: document.getElementById("message").value

})

});

const text=await response.text();

document.getElementById("reply").innerHTML = text;

btn.innerHTML = "✅ Request Sent";

btn.disabled = true;

}

</script>

</body>
</html>
